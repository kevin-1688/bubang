<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BÚ-BĀNG 毋忘</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=IM+Fell+English:ital@0;1&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="title-screen">
  <div class="title-year">台灣 · 1952 · 白色恐怖時期</div>
  <div class="title-main">BÚ-BĀNG</div>
  <div class="title-zh">毋忘 · 無望</div>
  <div class="title-tagline">「在一切都被剝奪的年代，身體是最後的自由。」<br><span style="font-size:.85em;opacity:.6">In an era where everything is stripped away, your body is the last frontier of freedom.</span></div>
  <button class="title-start" onclick="startGame()">開始遊戲 · Begin</button>
  <div class="title-bottom">MVP Interactive Demo · Awack Studio · 2026</div>
</div>

<div class="fear-flash" id="fear-flash"></div>

<div class="notif" id="notif">
  <div class="notif-title" id="notif-title">系統</div>
  <div id="notif-body">—</div>
</div>

<div id="ending-screen">
  <div class="ending-small">結局 ENDING</div>
  <div class="ending-main" id="e-title">—</div>
  <div class="ending-quote" id="e-quote">—</div>
  <div class="ending-stats">
    <div class="ending-stat"><div class="ending-stat-n" id="e-fear">0</div><div class="ending-stat-l">恐懼值</div></div>
    <div class="ending-stat"><div class="ending-stat-n" id="e-silence">0</div><div class="ending-stat-l">沉默值</div></div>
    <div class="ending-stat"><div class="ending-stat-n" id="e-choices">0</div><div class="ending-stat-l">選擇次數</div></div>
  </div>
  <button class="ending-restart" onclick="restartGame()">再試一次 · Play Again</button>
</div>

<div id="game">
  <div id="hud">
    <div class="hud-loc" id="hud-loc">台北 · 大稻埕</div>
    <div class="hud-stats">
      <div class="stat-item"><div class="stat-label">Fear</div><div class="stat-bar-wrap"><div class="stat-bar fear" id="bar-fear" style="width:10%"></div></div><div class="stat-val" id="val-fear">10</div></div>
      <div class="stat-item"><div class="stat-label">Silence</div><div class="stat-bar-wrap"><div class="stat-bar silence" id="bar-silence" style="width:0%"></div></div><div class="stat-val" id="val-silence">0</div></div>
      <div class="stat-item"><div class="stat-label">Will</div><div class="stat-bar-wrap"><div class="stat-bar will" id="bar-will" style="width:80%"></div></div><div class="stat-val" id="val-will">80</div></div>
    </div>
  </div>
  <div class="scene-art" id="scene-art"></div>
  <div class="scene-bg" id="scene-bg"></div>
  <div class="scene-overlay"></div>
  <div class="fear-vignette" id="fear-vignette"></div>
  <div id="scene-area">
    <div id="narrative" style="padding-top:55vh"></div>
  </div>
</div>

<script src="bubang.js"></script>
</body>
</html>
