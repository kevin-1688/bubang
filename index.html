<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BÚ-BĀNG 毋忘</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=IM+Fell+English:ital@0;1&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a26;--ember:#C4622D;--ember2:#E8853A;--blood:#8b1a1a;--text:#D4C9B8;--text2:#8a7f70;--text3:#4a4540;--line:rgba(212,201,184,.12);--line2:rgba(212,201,184,.25);--serif:'Noto Serif TC',serif;--fell:'IM Fell English',serif;--mono:'Courier Prime',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--serif);min-height:100vh;overflow-x:hidden}
#title-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 1.5s ease}
#title-screen.fade-out{opacity:0;pointer-events:none}
.title-year{font-family:var(--mono);font-size:12px;letter-spacing:.3em;color:var(--text3);text-transform:uppercase;margin-bottom:3rem;animation:fadeUp 1s .3s both}
.title-main{font-family:var(--fell);font-size:clamp(3rem,10vw,7rem);font-weight:400;letter-spacing:.05em;line-height:1;text-align:center;margin-bottom:.5rem;animation:fadeUp 1s .5s both}
.title-zh{font-family:var(--serif);font-size:clamp(.9rem,2.5vw,1.4rem);font-weight:300;color:var(--text2);letter-spacing:.3em;text-align:center;margin-bottom:3rem;animation:fadeUp 1s .7s both}
.title-tagline{font-family:var(--fell);font-style:italic;font-size:clamp(.85rem,1.8vw,1.1rem);color:var(--text3);text-align:center;margin-bottom:4rem;line-height:1.8;animation:fadeUp 1s .9s both}
.title-start{font-family:var(--mono);font-size:13px;letter-spacing:.2em;color:var(--text2);border:1px solid var(--line2);padding:12px 32px;background:transparent;cursor:pointer;text-transform:uppercase;animation:fadeUp 1s 1.1s both,pulse 2s 2.2s infinite;transition:color .3s,border-color .3s}
.title-start:hover{color:var(--ember);border-color:var(--ember)}
.title-bottom{position:absolute;bottom:2rem;font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.15em;animation:fadeUp 1s 1.3s both}
#game{display:none;min-height:100vh}
#game.active{display:flex;flex-direction:column}
#hud{position:fixed;top:0;left:0;right:0;padding:1rem 2rem;display:flex;align-items:center;gap:2rem;z-index:50;border-bottom:1px solid var(--line);background:rgba(10,10,15,.9);backdrop-filter:blur(8px)}
.hud-loc{font-family:var(--mono);font-size:11px;letter-spacing:.15em;color:var(--ember);text-transform:uppercase}
.hud-stats{display:flex;gap:1.5rem;margin-left:auto}
.stat-item{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.stat-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase}
.stat-bar-wrap{width:60px;height:3px;background:rgba(255,255,255,.08)}
.stat-bar{height:100%;transition:width .8s ease}
.stat-bar.fear{background:var(--blood)}
.stat-bar.silence{background:#6040a0}
.stat-bar.will{background:var(--ember)}
.stat-val{font-family:var(--mono);font-size:9px;color:var(--text3)}
#scene-area{flex:1;display:flex;flex-direction:column;min-height:100vh;padding-top:60px}
.scene-bg{position:fixed;inset:0;z-index:0;transition:background 2s ease}
.scene-overlay{position:fixed;inset:0;z-index:1;background:linear-gradient(to top,rgba(10,10,15,1) 0%,rgba(10,10,15,.6) 50%,rgba(10,10,15,.3) 100%);pointer-events:none}
.fear-vignette{position:fixed;inset:0;z-index:2;pointer-events:none;transition:box-shadow 1s ease}
.scene-art{position:fixed;top:60px;left:0;right:0;height:55vh;z-index:3;display:flex;align-items:flex-end;justify-content:center;pointer-events:none}
.svg-scene{width:100%;max-width:900px;height:auto}
#narrative{position:relative;z-index:10;margin-top:auto;padding:2rem;max-width:720px;width:100%;margin-left:auto;margin-right:auto}
.location-header{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--ember2);text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;opacity:0;animation:fadeUp .6s ease forwards}
.location-header::after{content:'';flex:1;height:1px;background:var(--line)}
.narrator-text{font-family:var(--fell);font-style:italic;font-size:clamp(1rem,2.5vw,1.25rem);line-height:1.9;margin-bottom:1.5rem;opacity:0;animation:fadeUp .6s .2s ease forwards}
.char-name{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--ember);text-transform:uppercase;margin-bottom:.5rem;opacity:0;animation:fadeUp .4s ease forwards}
.dialogue-text{font-family:var(--serif);font-size:clamp(.95rem,2vw,1.1rem);line-height:1.9;border-left:2px solid var(--ember);padding-left:1.25rem;margin-bottom:2rem;opacity:0;animation:fadeUp .5s .1s ease forwards}
.choices{display:flex;flex-direction:column;gap:.75rem;margin-bottom:2rem;opacity:0;animation:fadeUp .6s .4s ease forwards}
.choice-btn{display:flex;align-items:flex-start;gap:1rem;padding:1rem 1.25rem;border:1px solid var(--line);background:rgba(26,26,38,.8);color:var(--text);cursor:pointer;text-align:left;font-family:var(--serif);font-size:clamp(.85rem,1.8vw,1rem);line-height:1.6;transition:border-color .3s,background .3s,transform .15s;backdrop-filter:blur(4px)}
.choice-btn:hover{border-color:var(--line2);background:rgba(36,36,54,.9);transform:translateX(4px)}
.choice-btn.danger{border-color:rgba(139,26,26,.3)}
.choice-btn.danger:hover{border-color:var(--blood)}
.choice-btn.safe{border-color:rgba(30,58,30,.4)}
.choice-btn.safe:hover{border-color:#2a6a2a}
.choice-num{font-family:var(--mono);font-size:11px;color:var(--text3);min-width:20px;margin-top:2px}
.choice-effect{font-family:var(--mono);font-size:10px;margin-left:auto;padding:2px 8px;align-self:flex-start;white-space:nowrap;margin-top:2px}
.choice-effect.neg{color:var(--blood);border:1px solid rgba(139,26,26,.4)}
.choice-effect.pos{color:#4a8a4a;border:1px solid rgba(74,138,74,.4)}
.choice-effect.neu{color:var(--text3);border:1px solid var(--line)}
.exercise-zone{border:1px solid var(--line);background:rgba(26,26,38,.9);padding:1.5rem;margin-bottom:2rem;backdrop-filter:blur(4px);opacity:0;animation:fadeUp .6s .3s ease forwards}
.ex-header{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--ember);text-transform:uppercase;margin-bottom:1rem}
.ex-move-name{font-family:var(--fell);font-size:1.4rem;font-style:italic;margin-bottom:.5rem}
.ex-desc{font-size:.9rem;color:var(--text2);line-height:1.7;margin-bottom:1.25rem}
.ex-counter{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.25rem}
.ex-count-display{font-family:var(--mono);font-size:2.5rem;color:var(--ember);min-width:60px}
.ex-target{font-family:var(--mono);font-size:.85rem;color:var(--text2)}
.ex-progress-wrap{flex:1;height:4px;background:rgba(255,255,255,.07)}
.ex-progress-fill{height:100%;background:var(--ember);transition:width .3s ease}
.ex-btn{font-family:var(--mono);font-size:12px;letter-spacing:.1em;padding:10px 24px;border:1px solid var(--ember);background:transparent;color:var(--ember);cursor:pointer;text-transform:uppercase;transition:background .2s,color .2s;margin-right:.75rem}
.ex-btn:hover{background:var(--ember);color:var(--bg)}
.ex-btn.secondary{border-color:var(--line);color:var(--text2)}
.ex-btn.secondary:hover{border-color:var(--line2);color:var(--text)}
.fear-flash{position:fixed;inset:0;z-index:200;pointer-events:none;opacity:0;transition:opacity .15s ease;background:rgba(139,26,26,.15)}
.fear-flash.show{opacity:1}
.notif{position:fixed;top:5rem;right:2rem;z-index:100;max-width:280px;border:1px solid var(--line);background:rgba(20,20,30,.95);padding:.875rem 1.125rem;font-family:var(--mono);font-size:11px;color:var(--text2);letter-spacing:.05em;transform:translateX(120%);transition:transform .4s ease;backdrop-filter:blur(8px)}
.notif.show{transform:translateX(0)}
.notif-title{font-size:10px;letter-spacing:.15em;color:var(--ember);text-transform:uppercase;margin-bottom:4px}
#ending-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
#ending-screen.active{display:flex}
.ending-small{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin-bottom:1rem;animation:fadeUp .8s .3s both}
.ending-main{font-family:var(--fell);font-size:clamp(2rem,6vw,4rem);font-weight:400;text-align:center;margin-bottom:1.5rem;animation:fadeUp .8s .5s both}
.ending-quote{font-family:var(--fell);font-style:italic;font-size:clamp(.95rem,2vw,1.2rem);color:var(--text2);text-align:center;max-width:500px;line-height:1.9;margin-bottom:3rem;animation:fadeUp .8s .7s both}
.ending-stats{display:flex;gap:2rem;margin-bottom:3rem;animation:fadeUp .8s .9s both}
.ending-stat{text-align:center}
.ending-stat-n{font-family:var(--mono);font-size:1.8rem;color:var(--ember)}
.ending-stat-l{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-top:4px}
.ending-restart{font-family:var(--mono);font-size:12px;letter-spacing:.15em;padding:10px 28px;border:1px solid var(--line2);background:transparent;color:var(--text2);cursor:pointer;text-transform:uppercase;transition:color .3s,border-color .3s;animation:fadeUp .8s 1.1s both}
.ending-restart:hover{color:var(--ember);border-color:var(--ember)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.shaking{animation:shake .3s ease}
@media(max-width:600px){#hud{padding:.75rem 1rem;gap:1rem}.hud-stats{gap:1rem}.stat-bar-wrap{width:40px}#narrative{padding:1.25rem}.choice-btn{padding:.875rem 1rem}}
</style>
</head>
<body>

<div id="title-screen">
  <div class="title-year">台灣 · 1952 · 白色恐怖時期</div>
  <div class="title-main">BÚ-BĀNG</div>
  <div class="title-zh">毋忘 · 無望</div>
  <div class="title-tagline">「在一切都被剝奪的年代，身體是最後的自由。」<br><span style="font-size:.85em;opacity:.6">In an era where everything is stripped away, your body is the last frontier of freedom.</span></div>
  <button class="title-start" onclick="startGame()">開始遊戲 · Begin</button>
  <div class="title-bottom">MVP Interactive Demo · Awack Studio · 2026</div>
</div>

<div class="fear-flash" id="fear-flash"></div>

<div class="notif" id="notif">
  <div class="notif-title" id="notif-title">系統</div>
  <div id="notif-body">—</div>
</div>

<div id="ending-screen">
  <div class="ending-small">結局 ENDING</div>
  <div class="ending-main" id="e-title">—</div>
  <div class="ending-quote" id="e-quote">—</div>
  <div class="ending-stats">
    <div class="ending-stat"><div class="ending-stat-n" id="e-fear">0</div><div class="ending-stat-l">恐懼值</div></div>
    <div class="ending-stat"><div class="ending-stat-n" id="e-silence">0</div><div class="ending-stat-l">沉默值</div></div>
    <div class="ending-stat"><div class="ending-stat-n" id="e-choices">0</div><div class="ending-stat-l">選擇次數</div></div>
  </div>
  <button class="ending-restart" onclick="restartGame()">再試一次 · Play Again</button>
</div>

<div id="game">
  <div id="hud">
    <div class="hud-loc" id="hud-loc">台北 · 大稻埕</div>
    <div class="hud-stats">
      <div class="stat-item"><div class="stat-label">Fear</div><div class="stat-bar-wrap"><div class="stat-bar fear" id="bar-fear" style="width:10%"></div></div><div class="stat-val" id="val-fear">10</div></div>
      <div class="stat-item"><div class="stat-label">Silence</div><div class="stat-bar-wrap"><div class="stat-bar silence" id="bar-silence" style="width:0%"></div></div><div class="stat-val" id="val-silence">0</div></div>
      <div class="stat-item"><div class="stat-label">Will</div><div class="stat-bar-wrap"><div class="stat-bar will" id="bar-will" style="width:80%"></div></div><div class="stat-val" id="val-will">80</div></div>
    </div>
  </div>
  <div class="scene-art" id="scene-art"></div>
  <div class="scene-bg" id="scene-bg"></div>
  <div class="scene-overlay"></div>
  <div class="fear-vignette" id="fear-vignette"></div>
  <div id="scene-area">
    <div id="narrative" style="padding-top:55vh"></div>
  </div>
</div>

let notifTm=null;

function updateHUD(){
  const f=Math.min(100,Math.max(0,ST.fear));
  const s=Math.min(100,Math.max(0,ST.silence));
  const w=Math.min(100,Math.max(0,ST.will));
  document.getElementById('bar-fear').style.width=f+'%';
  document.getElementById('bar-silence').style.width=s+'%';
  document.getElementById('bar-will').style.width=w+'%';
  document.getElementById('val-fear').textContent=Math.round(f);
  document.getElementById('val-silence').textContent=Math.round(s);
  document.getElementById('val-will').textContent=Math.round(w);
  const vi=Math.max(0,(f-30)/70);
  document.getElementById('fear-vignette').style.boxShadow=`inset 0 0 ${80*vi}px ${30*vi}px rgba(139,26,26,${.3*vi})`;
  if(f>80){document.getElementById('hud').classList.add('shaking');setTimeout(()=>document.getElementById('hud').classList.remove('shaking'),300);}
}

function showNotif(title,body){
  const n=document.getElementById('notif');
  document.getElementById('notif-title').textContent=title;
  document.getElementById('notif-body').textContent=body;
  n.classList.add('show');
  if(notifTm)clearTimeout(notifTm);
  notifTm=setTimeout(()=>n.classList.remove('show'),3500);
}

function flashFear(){
  const f=document.getElementById('fear-flash');
  f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'),300);
}

function applyChoice(c){
  if(c.f>10)flashFear();
  ST.fear=Math.min(100,Math.max(0,ST.fear+c.f));
  ST.silence=Math.min(100,Math.max(0,ST.silence+c.s));
  ST.will=Math.min(100,Math.max(0,ST.will+c.w));
  ST.choices++;
  updateHUD();
  if(c.f>15)showNotif('恐懼上升','心跳加速，雙手發抖。');
  else if(c.f<-10)showNotif('恐懼降低','短暫的平靜——但不會持續太久。');
  if(c.s>20)showNotif('沉默加深','你把真相埋得更深了。');
  if(c.w>10)showNotif('意志增強','你知道自己在做什麼。');
  else if(c.w<-15)showNotif('意志消耗','每一個謊言都有代價。');
}

function renderScene(idx){
  const sc=SCENES[idx];
  if(!sc)return;
  document.getElementById('hud-loc').textContent=sc.loc;
  document.getElementById('scene-art').innerHTML=ART[sc.art]||'';
  let html='<div class="location-header">'+sc.loc+'</div>';
  if(sc.narrator)html+='<div class="narrator-text">'+sc.narrator+'</div>';
  if(sc.dialogue){
    if(sc.char)html+='<div class="char-name">'+sc.char+'</div>';
    html+='<div class="dialogue-text">'+sc.dialogue+'</div>';
  }
  if(sc.exercise){
    const ex=sc.exercise;
    html+=`<div class="exercise-zone" id="ex-zone">
      <div class="ex-header">&#9632; 動作指令 · ${ex.attr}</div>
      <div class="ex-move-name">${ex.move}</div>
      <div class="ex-desc">${ex.desc}</div>
      <div class="ex-counter">
        <div class="ex-count-display" id="ex-count">0</div>
        <div><div class="ex-target">/ ${ex.target} 下</div></div>
        <div class="ex-progress-wrap"><div class="ex-progress-fill" id="ex-bar" style="width:0%"></div></div>
      </div>
      <button class="ex-btn" id="ex-btn" onclick="doEx(${idx})">撐住 · DO IT</button>
      <button class="ex-btn secondary" onclick="skipEx(${idx})">跳過（意志 -10）</button>
    </div>`;
    ST.exCount=0;
  }
  if(sc.choices){
    html+='<div class="choices">';
    sc.choices.forEach((c,i)=>{
      const cls=c.ef==='neg'?'danger':c.ef==='pos'?'safe':'';
      const lbl=c.label?`<span class="choice-effect ${c.ef==='neg'?'neg':c.ef==='pos'?'pos':'neu'}">${c.label}</span>`:'';
      html+=`<button class="choice-btn ${cls}" onclick="choose(${i},${idx})"><span class="choice-num">${i+1}</span><span>${c.text}</span>${lbl}</button>`;
    });
    html+='</div>';
  }
  document.getElementById('narrative').innerHTML=html;
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
  updateHUD();
}

function choose(oi,si){
  const c=SCENES[si].choices[oi];
  applyChoice(c);
  if(c.next==='ending')setTimeout(showEnding,800);
  else setTimeout(()=>renderScene(c.next),600);
}

function doEx(si){
  const ex=SCENES[si].exercise;
  ST.exCount=Math.min(ex.target,ST.exCount+1);
  const pct=(ST.exCount/ex.target)*100;
  const ec=document.getElementById('ex-count');
  const eb=document.getElementById('ex-bar');
  const btn=document.getElementById('ex-btn');
  if(ec)ec.textContent=ST.exCount;
  if(eb)eb.style.width=pct+'%';
  if(btn){btn.style.transform='scale(0.95)';setTimeout(()=>btn.style.transform='',100);}
  if(ST.exCount>=ex.target){
    ST.will=Math.min(100,ST.will+15);
    updateHUD();
    showNotif('訓練完成',ex.sMsg);
    const zone=document.getElementById('ex-zone');
    if(zone)zone.innerHTML=`<div class="ex-header" style="color:var(--ember)">&#10003; 完成 · ${ex.attr} +15</div><div style="font-family:var(--fell);font-style:italic;font-size:1.1rem;line-height:1.8;margin-bottom:1rem">${ex.sMsg}</div><button class="ex-btn" onclick="skipEx(${si},true)">繼續 →</button>`;
  }
}

function skipEx(si,done=false){
  const ex=SCENES[si].exercise;
  if(!done){ST.will=Math.max(0,ST.will-10);ST.fear=Math.min(100,ST.fear+5);updateHUD();showNotif('略過訓練',ex.fMsg+' 意志-10');}
  setTimeout(()=>renderScene(done?ex.sNext:ex.fNext),400);
}

function showEnding(){
  const f=ST.fear,s=ST.silence;
  const avg=(f+s)/2;
  let title,quote;
  if(avg<=20){title='《還活著》';quote='找到了人，也沒有失去自己。黎明的第一道光，終於落在你的臉上。';}
  else if(avg<=45){title='《繼續走》';quote='活著，但做了一些無法完全原諒自己的事。你把那個重量帶上，繼續走。';}
  else if(avg<=70){title='《沉默的人》';quote='你學會了那個年代的生存法則。那些話，你永遠不會再說出口了。';}
  else if(avg<=90){title='《霧中》';quote='在尋找的過程中，你逐漸忘記自己在找什麼。霧越來越濃。';}
  else{title='《無聲的名字》';quote='活下來了。但沒有人知道你曾在那裡。';}
  document.getElementById('e-title').textContent=title;
  document.getElementById('e-quote').textContent=quote;
  document.getElementById('e-fear').textContent=Math.round(f);
  document.getElementById('e-silence').textContent=Math.round(s);
  document.getElementById('e-choices').textContent=ST.choices;
  document.getElementById('ending-screen').classList.add('active');
}

function startGame(){
  const t=document.getElementById('title-screen');
  t.classList.add('fade-out');
  setTimeout(()=>{t.style.display='none';document.getElementById('game').classList.add('active');renderScene(0);},1500);
}

function restartGame(){
  ST.fear=10;ST.silence=0;ST.will=80;ST.choices=0;ST.exCount=0;
  document.getElementById('ending-screen').classList.remove('active');
  renderScene(0);
}

document.addEventListener('keydown',e=>{
  const n=parseInt(e.key);
  if(!isNaN(n)&&n>=1&&n<=4){const bs=document.querySelectorAll('.choice-btn');if(bs[n-1])bs[n-1].click();}
  if(e.key===' '||e.key==='Enter'){const eb=document.getElementById('ex-btn');if(eb){e.preventDefault();eb.click();}}
});
</script>
